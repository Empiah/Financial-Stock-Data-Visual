appId: com.financialstockdatavisual.desktop
productName: Stock Visualizer
copyright: Copyright © 2026 Financial-Stock-Data-Visual
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - package.json
  - '!**/.DS_Store'
  - '!**/*.map'
asar: true
mac:
  category: public.app-category.finance
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  icon: resources/icon.icns
dmg:
  sign: false
  contents:
    - x: 110
      y: 150
    - x: 390
      y: 150
      type: link
      path: /Applications
